name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm check-all

      - name: Commit and push README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "Update generated README" && git push origin master)

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="0.1.0"
          else
            PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | awk -F. '{print $3 + 1}')
            MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | awk -F. '{print $1}')
            MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | awk -F. '{print $2}')
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"

      - name: Set version and publish
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          pnpm publish --no-git-checks --provenance

      - name: Create tag and release
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
